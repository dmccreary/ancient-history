site_name: Ancient History
repo_url: https://github.com/dmccreary/ancient-history
site_url: https://dmccreary.github.io/ancient-history/
site_description: An interactive intelligent textbook covering ancient world history from cosmic origins through 1200 CE, organized around the UCLA Big Era framework and integrating recent archaeological, paleoanthropological, and paleogenomic discoveries as first-class concept nodes.
site_author: Dan McCreary

nav:
  - Home: index.md
  - Course Description: course-description.md

  - Chapters:
    - List of Chapters: chapters/index.md
    - 1. Foundations of Historical Thinking: chapters/01-foundations-of-historical-thinking/index.md
    - 2. Cosmic and Biological Origins: chapters/02-cosmic-and-biological-origins/index.md
    - 3. Hominin Evolution and the Genus Homo: chapters/03-hominin-evolution-and-genus-homo/index.md
    - 4. Paleolithic Migrations and Ice-Age Worlds: chapters/04-paleolithic-migrations-and-ice-age-worlds/index.md
    - 5. Paleolithic Symbolic Culture and Other Hominins: chapters/05-paleolithic-symbolic-culture-and-other-hominins/index.md
    - 6. The Neolithic Revolution: chapters/06-the-neolithic-revolution/index.md
    - 7. Bronze Age Origins, Mesopotamia, and Egypt: chapters/07-bronze-age-mesopotamia-and-egypt/index.md
    - 8. Bronze Age Asia, the Aegean, and the Collapse: chapters/08-bronze-age-asia-aegean-and-collapse/index.md
    - 9. Iron Age and the Classical Greco-Roman World: chapters/09-iron-age-and-greco-roman-world/index.md
    - 10. The Axial Age and World Religions: chapters/10-the-axial-age-and-world-religions/index.md
    - 11. Classical Empires of Asia and Imperial Networks: chapters/11-classical-empires-of-asia/index.md
    - 12. Late Antiquity and the Byzantine World: chapters/12-late-antiquity-and-byzantium/index.md
    - 13. The Rise of Islam: chapters/13-the-rise-of-islam/index.md
    - 14. Tang and Song China and Carolingian Europe: chapters/14-tang-song-china-and-carolingian-europe/index.md
    - 15. Afro-Eurasian Networks: chapters/15-afro-eurasian-networks/index.md
    - 16. Pre-Columbian Americas and the Eve of Integration: chapters/16-pre-columbian-americas-and-eve-of-integration/index.md

  - Learning Graph:
    - Introduction: learning-graph/index.md
    - Course Description Assessment: learning-graph/course-description-assessment.md
    - Concept Enumeration: learning-graph/concept-list.md
    - Concept Taxonomy: learning-graph/concept-taxonomy.md
    - Graph Quality Analysis: learning-graph/quality-metrics.md
    - Taxonomy Distribution: learning-graph/taxonomy-distribution.md
    - Mascot Style Guide: learning-graph/mascot-test.md

  - MicroSims:
    - Learning Graph Viewer: sims/graph-viewer/index.md

  # Add these once the corresponding files exist:
  # - About This Textbook: about.md
  # - Glossary: glossary.md
  # - FAQ: faq.md
  # - Teacher's Guide: teachers-guide/index.md
  # - License: license.md
  # - Contact: contact.md

theme:
  name: material
  # Brown/amber palette evokes parchment, archaeology, and scholarly antiquity.
  # Swap to indigo/amber for a more academic feel, or deep purple for "ancient".
  palette:
    primary: 'brown'
    accent: 'amber'
  include_sidebar: true
  features:
    - content.code.copy
    - navigation.expand
    - navigation.path
    - navigation.prune
    - navigation.indexes
    - toc.follow
    - navigation.top
    - navigation.footer
    - content.action.edit
  # The neutral Chronos pose serves as the site logo. The PNG must exist
  # at docs/img/mascot/neutral.png before the site will render the logo;
  # see docs/img/mascot/image-prompts.md for the generation prompt.
  logo: img/mascot/neutral.png
  # favicon: img/favicon.ico  # add once a favicon exists

plugins:
  - search

  # The plugins below need extra pip installs and asset files.
  # Uncomment after running the corresponding installers:
  #
  # - social               # requires Pillow + cairo; needs hooks/social_override.py
  # - glightbox:           # pip install mkdocs-glightbox
  #     touchNavigation: true
  #     loop: false
  #     effect: zoom
  #     slide_effect: slide
  #     width: 100%
  #     height: auto
  #     zoomable: true
  #     draggable: true
  # - exclude:             # pip install mkdocs-exclude
  #     glob:
  #       - "**image-prompt*.md"
  #       - "**/TODO.md"

# hooks:
#   - plugins/social_override.py

markdown_extensions:
  - md_in_html
  - attr_list
  - admonition
  - footnotes
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      linenums: true
  - pymdownx.arithmatex:
      generic: true

extra_css:
  - css/extra.css
  - css/mascot.css

extra_javascript:
  - js/extra.js

# Add these once the corresponding markdown extension is enabled:
#   - js/mathjax-config.js
#   - https://unpkg.com/mathjax@3/es5/tex-chtml.js

watch:
  - docs
  - mkdocs.yml

copyright: Copyright &copy; 2026 Dan McCreary. Licensed under <a href="license/">CC BY-NC-SA 4.0</a> for non-commercial use.

extra:
  # remove the "Generated by MkDocs" in the footer
  generator: false

  # Google Analytics — set this once you have a property ID for this textbook
  # analytics:
  #   provider: google
  #   property: G-XXXXXXXXXX

  schema: https://dmccreary.github.io/intelligent-textbooks/ns/textbook/v1
  textbook_name: Ancient History
  textbook_version: "0.1"
